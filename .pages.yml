    fields:
      - name: title
        label: Titulo de la pagina
        type: string
      - name: slug
        label: Slug
        type: string
      - name: eyebrow
        label: Eyebrow hero
        type: string
      - name: intro
        label: Parrafo principal hero
        type: text
      - name: lead
        label: Texto secundario hero
        type: text
      - name: contactPrimaryLabel
        label: Boton correo principal
        type: string
      - name: contactPrimaryUrl
        label: Link correo principal
        type: string
      - name: contactSecondaryLabel
        label: Boton correo secundario
        type: string
      - name: contactSecondaryUrl
        label: Link correo secundario
        type: string
      - name: heroImage
        label: Foto principal
        type: image

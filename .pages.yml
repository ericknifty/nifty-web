media:
  - name: content_images
    label: Imagenes
    input: public/media/images
    output: /media/images
    extensions: [jpg, jpeg, png, webp, avif, svg]

  - name: downloads
    label: Descargas
    input: public/media/downloads
    output: /media/downloads
    extensions: [pdf, zip, rar, 7z, doc, docx, xls, xlsx, txt]

  - name: content_video
    label: Videos
    input: public/media/video
    output: /media/video
    extensions: [mp4, webm, mov]

  - name: lottie_files
    label: Lottie
    input: public/lottie
    output: /lottie
    extensions: [json]

content:
  - name: site_settings
    label: Ajustes del sitio
    type: file
    path: src/content/settings/site.json
    fields:
      - name: siteName
        label: Nombre del sitio
        type: string
      - name: siteTagline
        label: Tagline general
        type: text
      - name: siteDescription
        label: Descripcion SEO general
        type: text
      - name: email
        label: Email
        type: string
      - name: location
        label: Ubicacion
        type: string
      - name: primaryCtaLabel
        label: CTA principal
        type: string
      - name: primaryCtaUrl
        label: URL CTA principal
        type: string
      - name: secondaryCtaLabel
        label: CTA secundaria
        type: string
      - name: secondaryCtaUrl
        label: URL CTA secundaria
        type: string
      - name: socialVimeo
        label: Vimeo
        type: string
      - name: socialLinkedIn
        label: LinkedIn
        type: string
      - name: socialGitHub
        label: GitHub

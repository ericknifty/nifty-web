media:
  - name: content_images
    label: Imagenes
    input: public/media/images
    output: /media/images
    extensions: [jpg, jpeg, png, webp, avif, svg]

  - name: downloads
    label: Descargas
    input: public/media/downloads
    output: /media/downloads
    extensions: [pdf, zip, rar, 7z, doc, docx, xls, xlsx, txt]

  - name: content_video
    label: Videos
    input: public/media/video
    output: /media/video
    extensions: [mp4, webm, mov]

  - name: lottie_files
    label: Lottie
    input: public/lottie
    output: /lottie
    extensions: [json]

content:
  - name: site_settings
    label: Ajustes del sitio
    type: file
    path: src/content/settings/site.json
    fields:
      - name: siteName
        label: Nombre del sitio
        type: string
      - name: siteTagline
        label: Tagline principal
        type: text
      - name: siteDescription
        label: Descripcion general del sitio
        type: text
      - name: email
        label: Email
        type: string
      - name: location
        label: Ubicacion
        type: string
      - name: primaryCtaLabel
        label: Texto CTA principal
        type: string
      - name: primaryCtaUrl
        label: URL CTA principal
        type: string
      - name: secondaryCtaLabel
        label: Texto CTA secundaria
        type: string
      - name: secondaryCtaUrl
        label: URL CTA secundaria
        type: string
      - name: socialVimeo
        label: Vimeo
        type: string
      - name: socialLinkedIn
        label: LinkedIn
        type: string
      - name: socialGitHub
        label: GitHub
        type: string
      - name: socialInstagram
        label: Instagram
        type: string

  - name: home_page
    label: Pagina Inicio
    type: file
    path: src/content/pages/inicio.md
    fields:
      - name: title
        label: Titulo interno de la pagina
        type: string
      - name: slug
        label: Slug
        type: string
      - name: eyebrow
        label: Eyebrow hero
        type: string
      - name: intro
        label: Texto principal
        type: text
      - name: lead
        label: Texto secundario
        type: text
      - name: panelEyebrow
        label: Eyebrow panel azul
        type: string
      - name: panelTitle
        label: Titulo panel azul
        type: text
      - name: panelBody
        label: Texto panel azul
        type: text
      - name: panelItems
        label: Lista panel azul (una por linea)
        type: text
      - name: serviceTitle
        label: Titulo tarjeta servicios
        type: text
      - name: serviceItems
        label: Items servicios (uno por linea)
        type: text
      - name: areaMotionCopy
        label: Texto area motion
        type: text
      - name: areaPrintCopy
        label: Texto area print
        type: text
      - name: areaWebCopy
        label: Texto area web
        type: text
      - name: body
        label: Contenido de la pagina
        type: rich-text
        options:
          format: markdown
          media: content_images
          path: public/media/images/pages
          rename: safe
          switcher: true

  - name: about_page
    label: Pagina Sobre mi
    type: file
    path: src/content/pages/sobre-mi.md
    fields:
      - name: title
        label: Titulo de la pagina
        type: string
      - name: slug
        label: Slug
        type: string
      - name: intro
        label: Texto principal
        type: text
      - name: lead
        label: Texto secundario
        type: text
      - name: heroImage
        label: Foto principal
        type: image
        options:
          media: content_images
          path: public/media/images/pages
      - name: heroImageAlt
        label: Texto alternativo foto
        type: string
      - name: body
        label: Contenido de la pagina
        type: rich-text
        options:
          format: markdown
          media: content_images
          path: public/media/images/pages
          rename: safe
          switcher: true

  - name: cv_page
    label: Pagina CV
    type: file
    path: src/content/pages/cv.md
    fields:
      - name: title
        label: Titulo de la pagina
        type: string
      - name: slug
        label: Slug
        type: string
      - name: eyebrow
        label: Eyebrow hero
        type: string
      - name: intro
        label: Texto principal
        type: text
      - name: lead
        label: Texto secundario
        type: text
      - name: panelEyebrow
        label: Eyebrow panel azul
        type: string
      - name: panelTitle
        label: Titulo panel azul
        type: text
      - name: panelBody
        label: Texto panel azul
        type: text
      - name: attachments
        label: Archivos descargables
        type: file
        options:
          media: downloads
          path: public/media/downloads/pages
          multiple: true
      - name: body
        label: Contenido de la pagina
        type: rich-text
        options:
          format: markdown
          media: content_images
          path: public/media/images/pages
          rename: safe
          switcher: true

  - name: portfolio_page
    label: Pagina Portafolio
    type: file
    path: src/content/pages/portafolio.md
    fields:
      - name: title
        label: Titulo de la pagina
        type: string
      - name: slug
        label: Slug
        type: string
      - name: eyebrow
        label: Eyebrow hero
        type: string
      - name: intro
        label: Texto principal
        type: text
      - name: lead
        label: Texto secundario
        type: text

  - name: blog_page
    label: Pagina Blog
    type: file
    path: src/content/pages/blog.md
    fields:
      - name: title
        label: Titulo de la pagina
        type: string
      - name: slug
        label: Slug
        type: string
      - name: eyebrow
        label: Eyebrow hero
        type: string
      - name: intro
        label: Texto principal
        type: text
      - name: lead
        label: Texto secundario
        type: text

  - name: tools_page
    label: Pagina Utilidades
    type: file
    path: src/content/pages/utilidades.md
    fields:
      - name: title
        label: Titulo de la pagina
        type: string
      - name: slug
        label: Slug
        type: string
      - name: eyebrow
        label: Eyebrow hero
        type: string
      - name: intro
        label: Texto principal
        type: text
      - name: lead
        label: Texto secundario
        type: text

  - name: cv_profiles
    label: CV / Perfiles
    type: collection
    path: src/content/cv-profiles
    filename: "{fields.slug}.md"
    view:
      primary: title
      fields: [title, tabLabel, order]
      search: [title, summary, tabLabel]
    fields:
      - name: title
        label: Titulo del perfil
        type: string
      - name: slug
        label: Slug interno
        type: string
      - name: tabLabel
        label: Nombre de la pestana
        type: string
      - name: summary
        label: Resumen breve
        type: text
      - name: order
        label: Orden de aparicion
        type: number
      - name: attachments
        label: Archivos descargables
        type: file
        options:
          media: downloads
          path: public/media/downloads/cv
          multiple: true
      - name: body
        label: Contenido del perfil
        type: rich-text
        options:
          format: markdown
          media: content_images
          path: public/media/images/cv
          rename: safe
          switcher: true

  - name: posts
    label: Blog / Posts
    type: collection
    path: src/content/posts
    filename: "{fields.slug}.md"
    view:
      primary: title
      fields: [title, category, date, draft]
      search: [title, excerpt, tags]
    fields:
      - name: title
        label: Titulo del post
        type: string
      - name: slug
        label: Slug / URL
        type: string
      - name: date
        label: Fecha de publicacion
        type: date
      - name: category
        label: Categoria principal
        type: select
        options:
          values: [motion, print, web, reflexiones, vida, hacks]
      - name: excerpt
        label: Extracto breve
        type: text
      - name: cover
        label: Imagen de portada
        type: image
        options:
          media: content_images
          path: public/media/images/posts
      - name: tags
        label: Etiquetas del post (una por linea o separadas por coma)
        type: text
      - name: downloads
        label: Archivos descargables
        type: file
        options:
          media: downloads
          path: public/media/downloads/posts
          multiple: true
      - name: videoUrl
        label: URL de video externo
        type: string
      - name: videoFile
        label: Archivo de video local
        type: file
        options:
          media: content_video
          path: public/media/video/posts
          extensions: [mp4, webm, mov]
      - name: featured
        label: Destacado
        type: boolean
        default: false
      - name: draft
        label: Guardar como borrador
        type: boolean
        default: false
      - name: body
        label: Contenido del post
        type: rich-text
        options:
          format: markdown
          media: content_images
          path: public/media/images/posts
          rename: safe
          switcher: true

  - name: projects
    label: Portafolio
    type: collection
    path: src/content/projects
    filename: "{fields.slug}.md"
    view:
      primary: title
      fields: [title, area, date, featured]
      search: [title, summary, tags]
    fields:
      - name: title
        label: Titulo del proyecto
        type: string
      - name: slug
        label: Slug / URL
        type: string
      - name: area
        label: Area del portafolio
        type: select
        options:
          values: [motion, print, web]
      - name: date
        label: Fecha del proyecto
        type: date
      - name: summary
        label: Resumen corto
        type: text
      - name: cover
        label: Imagen de portada
        type: image
        options:
          media: content_images
          path: public/media/images/projects
      - name: gallery
        label: Galeria de imagenes
        type: image
        options:
          media: content_images
          path: public/media/images/projects
          multiple: true
      - name: tags
        label: Etiquetas del proyecto (una por linea o separadas por coma)
        type: text
      - name: downloads
        label: Archivos descargables
        type: file
        options:
          media: downloads
          path: public/media/downloads/projects
          multiple: true
      - name: videoUrl
        label: URL de video externo
        type: string
      - name: videoFile
        label: Archivo de video local
        type: file
        options:
          media: content_video
          path: public/media/video/projects
      - name: lottieFile
        label: Animacion Lottie
        type: file
        options:
          media: lottie_files
          path: public/lottie/projects
          extensions: [json]
      - name: featured
        label: Destacado
        type: boolean
        default: false
      - name: draft
        label: Guardar como borrador
        type: boolean
        default: false
      - name: body
        label: Contenido del proyecto
        type: rich-text
        options:
          format: markdown
          media: content_images
          path: public/media/images/projects
          rename: safe
          switcher: true

  - name: tools
    label: Utilidades / Demos
    type: collection
    path: src/content/tools
    filename: "{fields.slug}.md"
    view:
      primary: title
      fields: [title, status, featured, draft]
      search: [title, summary]
    fields:
      - name: title
        label: Titulo de la utilidad
        type: string
      - name: slug
        label: Slug / URL
        type: string
      - name: summary
        label: Resumen corto
        type: text
      - name: status
        label: Estado de la utilidad
        type: select
        options:
          values: [idea, beta, published, archived]
      - name: cover
        label: Imagen de portada
        type: image
        options:
          media: content_images
          path: public/media/images/tools
      - name: demoPath
        label: Ruta interna de la demo
        type: string
      - name: externalUrl
        label: URL externa de la demo
        type: string
      - name: downloads
        label: Archivos descargables
        type: file
        options:
          media: downloads
          path: public/media/downloads/tools
          multiple: true
      - name: lottieFile
        label: Animacion Lottie
        type: file
        options:
          media: lottie_files
          path: public/lottie/tools
          extensions: [json]
      - name: featured
        label: Destacado
        type: boolean
        default: false
      - name: draft
        label: Guardar como borrador
        type: boolean
        default: false
      - name: body
        label: Contenido de la utilidad
        type: rich-text
        options:
          format: markdown
          media: content_images
          path: public/media/images/tools
          rename: safe
          switcher: true

settings:
  content:
    merge: true
  commit:
    identity: app
    templates:
      create: "content(create): {path}"
      update: "content(update): {path}"
      delete: "content(delete): {path}"
      rename: "content(rename): {oldPath} -> {newPath}"

        label: Eyebrow pestañas
        type: string
      - name: tabsTitle
        label: Titulo pestañas
        type: string
      - name: attachments
        label: Archivos descargables
        type: file
        options:
          media: downloads
          path: public/media/downloads/pages
          multiple: true
      - name: body
        label: Contenido de la pagina
        type: rich-text
        options:
          format: markdown
          media: content_images
          path: public/media/images/pages
          rename: safe

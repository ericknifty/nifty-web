        type: text

  - name: tools_page
    label: Pagina Utilidades
    type: file
    path: src/content/pages/utilidades.md
    fields:
      - name: title
        label: Titulo de la pagina
        type: string
      - name: slug
        label: Slug
        type: string
      - name: eyebrow
        label: Eyebrow hero
        type: string
      - name: intro
        label: Parrafo principal hero
        type: text
      - name: lead
        label: Texto secundario hero
        type: text

  - name: cv_profiles
    label: CV / Perfiles
    type: collection
    path: src/content/cv-profiles
    filename: "{fields.slug}.md"
    view:
      primary: title
      fields: [title, tabLabel, order]
      search: [title, summary, tabLabel]
    fields:
      - name: title
        label: Titulo del perfil
        type: string
      - name: slug
        label: Slug interno
        type: string
      - name: tabLabel
        label: Nombre de la pestaña
        type: string
      - name: summary
        label: Resumen breve
        type: text
      - name: order
        label: Orden de aparicion
        type: number
      - name: attachments
        label: Archivos descargables
        type: file
        options:
          media: downloads
          path: public/media/downloads/cv
          multiple: true
      - name: body
        label: Contenido del perfil
        type: rich-text
        options:
          format: markdown
          media: content_images
          path: public/media/images/cv
          rename: safe
          switcher: true

  - name: posts
    label: Blog / Posts
    type: collection
    path: src/content/posts
    filename: "{fields.slug}.md"
    view:
      primary: title
      fields: [title, category, date, draft]
      search: [title, excerpt, tags]
    fields:
      - name: title
        label: Titulo del post
        type: string
      - name: slug
        label: Slug / URL
        type: string
      - name: date
        label: Fecha de publicacion
        type: date
      - name: category
        label: Categoria principal
        type: select
        options:
          values: [motion, print, web, reflexiones, vida, hacks]
      - name: excerpt
        label: Extracto breve
        type: text
      - name: detailLead
        label: Bajada detalle post
        type: text
      - name: cover
        label: Imagen de portada
        type: image
        options:
          media: content_images
          path: public/media/images/posts
      - name: tags
        label: Etiquetas del post (una por linea o separadas por coma)
        type: text
      - name: downloads
        label: Archivos descargables
        type: file
        options:
          media: downloads
          path: public/media/downloads/posts
          multiple: true
      - name: videoUrl
        label: URL de video externo
        type: string
      - name: videoFile
        label: Archivo de video local
        type: file
        options:
          media: content_video
          path: public/media/video/posts
          extensions: [mp4, webm, mov]
      - name: featured
        label: Destacado
        type: boolean
        default: false
      - name: draft
        label: Guardar como borrador
        type: boolean
        default: false
      - name: body
        label: Contenido del post
        type: rich-text
        options:
          format: markdown
          media: content_images
          path: public/media/images/posts
          rename: safe
          switcher: true

  - name: projects
    label: Portafolio
    type: collection
    path: src/content/projects
    filename: "{fields.slug}.md"
    view:
      primary: title
      fields: [title, area, date, featured]
      search: [title, summary, tags]
    fields:
      - name: title
        label: Titulo del proyecto
        type: string
      - name: slug
        label: Slug / URL
        type: string
      - name: area
        label: Area del portafolio
        type: select
        options:
          values: [motion, print, web]
      - name: date
        label: Fecha del proyecto
        type: date
      - name: summary
        label: Resumen corto
        type: text
      - name: detailLead
        label: Bajada detalle proyecto
        type: text
      - name: cover
        label: Imagen de portada
        type: image
        options:
          media: content_images
          path: public/media/images/projects
      - name: gallery
        label: Galeria de imagenes
        type: image
        options:
          media: content_images
          path: public/media/images/projects
          multiple: true
      - name: tags
        label: Etiquetas del proyecto (una por linea o separadas por coma)
        type: text
      - name: downloads
        label: Archivos descargables
        type: file
        options:
          media: downloads
          path: public/media/downloads/projects
          multiple: true
      - name: videoUrl
        label: URL de video externo
        type: string
      - name: videoFile
        label: Archivo de video local
        type: file
        options:
          media: content_video
          path: public/media/video/projects
      - name: lottieFile
        label: Animacion Lottie
        type: file
        options:
          media: lottie_files
          path: public/lottie/projects
          extensions: [json]
      - name: featured
        label: Destacado
        type: boolean
        default: false
      - name: draft
        label: Guardar como borrador
        type: boolean
        default: false
      - name: body
        label: Contenido del proyecto
        type: rich-text
        options:
          format: markdown
          media: content_images
          path: public/media/images/projects
          rename: safe
          switcher: true

  - name: tools
    label: Utilidades / Demos
    type: collection
    path: src/content/tools
    filename: "{fields.slug}.md"
    view:
      primary: title
      fields: [title, status, featured, draft]
      search: [title, summary]
    fields:
      - name: title
        label: Titulo de la utilidad
        type: string
      - name: slug
        label: Slug / URL
        type: string
      - name: summary
        label: Resumen corto
        type: text
      - name: detailLead
        label: Bajada detalle utilidad
        type: text
      - name: status
        label: Estado de la utilidad
        type: select
        options:
          values: [idea, beta, published, archived]
      - name: cover
        label: Imagen de portada
        type: image
        options:
          media: content_images
          path: public/media/images/tools
      - name: demoPath
        label: Ruta interna de la demo
        type: string
      - name: externalUrl
        label: URL externa de la demo
        type: string
      - name: downloads
        label: Archivos descargables
        type: file
        options:
          media: downloads
          path: public/media/downloads/tools
          multiple: true
      - name: lottieFile
        label: Animacion Lottie
        type: file
        options:
          media: lottie_files
          path: public/lottie/tools
          extensions: [json]
      - name: featured
        label: Destacado
        type: boolean
        default: false
      - name: draft
        label: Guardar como borrador
        type: boolean
        default: false
      - name: body
        label: Contenido de la utilidad
        type: rich-text
        options:
          format: markdown
          media: content_images
          path: public/media/images/tools
          rename: safe
          switcher: true

settings:
  content:
    merge: true
  commit:
    identity: app
    templates:
      create: "content(create): {path}"
      update: "content(update): {path}"
      delete: "content(delete): {path}"
      rename: "content(rename): {oldPath} -> {newPath}"

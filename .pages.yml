  - name: portfolio_page
    label: Pagina Portafolio
    type: file
    path: src/content/pages/portafolio.md
    fields:
      - name: title
        label: Titulo de la pagina
        type: string
      - name: slug
        label: Slug
        type: string
      - name: eyebrow
        label: Eyebrow hero
        type: string
      - name: intro
        label: Parrafo principal hero
        type: text
      - name: lead
        label: Texto secundario hero
        type: text

  - name: blog_page
    label: Pagina Blog
    type: file
    path: src/content/pages/blog.md
    fields:
      - name: title
        label: Titulo de la pagina
        type: string
      - name: slug
        label: Slug
        type: string
      - name: eyebrow
        label: Eyebrow hero
        type: string
      - name: intro
        label: Parrafo principal hero
        type: text
      - name: lead
        label: Texto secundario hero
        type: text
